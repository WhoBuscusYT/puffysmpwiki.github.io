<!DOCTYPE html>
<html lang="en">
  <head>
    <base href="wiki.puffysmp.org">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="/puffysmpwiki.github.io/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuffySMP Wiki</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * { font-family: 'Inter', system-ui, sans-serif; }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .animate-float { animation: float 6s ease-in-out infinite; }
    </style>
  </head>
  <body class="min-h-screen bg-slate-950 text-white antialiased">
    
    <!-- Background Effects -->
    <div class="fixed inset-0 -z-10">
      <div class="absolute top-0 left-1/4 w-96 h-96 bg-violet-500/20 rounded-full blur-3xl"></div>
      <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-fuchsia-500/20 rounded-full blur-3xl"></div>
      <div class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:64px_64px]"></div>
    </div>

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-slate-950/80 backdrop-blur-xl border-b border-slate-800/50">
      <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
        <a href="/" class="text-xl font-bold bg-gradient-to-r from-violet-400 to-fuchsia-400 bg-clip-text text-transparent">
          PuffySMP Wiki
        </a>
        <div class="hidden md:flex items-center gap-8">
          <a href="/crates" class="text-sm text-slate-400 hover:text-white transition-colors"><strong>Crates</strong></a>
          <a href="/ranks" class="text-sm text-slate-400 hover:text-white transition-colors">Ranks</a>
          <a href="/information" class="text-sm text-slate-400 hover:text-white transition-colors">Information</a>
          <a hred="/wiki-app" class="text-sm-text-slate-400 hover:text-white transition-colors"> Wiki App</a>
          <a href="/partners" class="px-4 py-2 bg-white text-slate-900 rounded-lg text-sm font-medium hover:bg-slate-100 transition-colors">
            Home
          </a>
        </div>
      </div>
    </nav>
